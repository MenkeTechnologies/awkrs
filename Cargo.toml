[package]
name = "awkrs"
version = "0.1.0"
edition = "2021"
description = "Multithreaded awk implementation in Rust with broad CLI compatibility"
license = "MIT"
repository = "https://github.com/MenkeTechnologies/awkrs"
readme = "README.md"
keywords = ["awk", "cli", "text-processing"]
categories = ["command-line-utilities", "parser-implementations"]

[[bin]]
name = "awkrs"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive", "cargo", "env"] }
crossbeam-channel = "0.5"
num_cpus = "1.16"
regex = "1.10"
thiserror = "2.0"


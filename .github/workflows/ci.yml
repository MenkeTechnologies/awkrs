name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# One Ubuntu job for fmt + clippy + doc keeps concurrent hosted runners low (avoids
# long "queued" times when fmt/clippy/doc each waited behind the test matrix).
jobs:
  lint:
    name: Lint (fmt, clippy, doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --verbose
      - run: cargo test --verbose

  parity:
    name: Parity vs gawk, mawk, BSD awk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Source-aware key — invalidate when ANY .rs file changes so the
          # cached `target/release/awkrs` binary can never be stale. Cargo.lock
          # alone misses source-only changes; we shipped fixes whose stale
          # cached binary then failed parity.
          key: ${{ runner.os }}-cargo-parity-${{ hashFiles('**/Cargo.lock', 'src/**/*.rs') }}
      - name: Install reference awks
        run: |
          sudo apt-get update
          # Noble dropped the transitional `nawk` metapackage; use `original-awk` (One True awk).
          sudo apt-get install -y gawk mawk original-awk
          command -v gawk && gawk --version | head -n1
          command -v mawk && mawk -W version 2>&1 | head -n1
          command -v original-awk && original-awk -W version 2>&1 | head -n1 || true
      # No explicit build step needed: run_parity.sh defers to
      # `cargo build --release` which is a no-op when up-to-date and a
      # full rebuild when source changed since the cache was written.
      - name: Full corpus vs gawk
        run: bash parity/run_parity.sh gawk
      - name: Full corpus vs mawk
        run: bash parity/run_parity.sh mawk
      - name: Full corpus vs original-awk (BSD family)
        run: env BSD_AWK=original-awk bash parity/run_parity.sh bsd

  docs-gates:
    name: Docs gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-target-blank-rel-noopener.sh
      - run: bash tests/docs-no-http-links.sh
      - run: bash tests/docs-no-inline-handlers.sh

  polish-gates:
    name: Polish gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/man-page-no-trailing-whitespace.sh
      - run: bash tests/man-page-final-newline.sh
      - run: bash tests/man-page-synopsis-section.sh
      - run: bash tests/tests-shell-executable.sh
      - run: bash tests/tests-shell-shebang.sh

  semantic-gates:
    name: Semantic gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash tests/docs-has-h1.sh
      - run: bash tests/docs-no-deprecated-tags.sh
      - run: bash tests/docs-no-placeholder-href.sh

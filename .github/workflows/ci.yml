name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# One Ubuntu job for fmt + clippy + doc keeps concurrent hosted runners low (avoids
# long "queued" times when fmt/clippy/doc each waited behind the test matrix).
jobs:
  lint:
    name: Lint (fmt, clippy, doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --verbose
      - run: cargo test --verbose

  parity:
    name: Parity vs gawk, mawk, BSD awk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-parity-${{ hashFiles('**/Cargo.lock') }}
      - name: Install reference awks
        run: |
          sudo apt-get update
          # Noble dropped the transitional `nawk` metapackage; use `original-awk` (One True awk).
          sudo apt-get install -y gawk mawk original-awk
          command -v gawk && gawk --version | head -n1
          command -v mawk && mawk -W version 2>&1 | head -n1
          command -v original-awk && original-awk -W version 2>&1 | head -n1 || true
      - name: Full corpus vs gawk
        run: bash parity/run_parity.sh gawk
      - name: Full corpus vs mawk
        run: bash parity/run_parity.sh mawk
      - name: Full corpus vs original-awk (BSD family)
        run: env BSD_AWK=original-awk bash parity/run_parity.sh bsd

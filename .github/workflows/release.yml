name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          for b in awkrs aw; do
            strip "$b" 2>/dev/null || true
          done
          tar czf ../../../awkrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz awkrs aw
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: awkrs-${{ matrix.target }}
          path: awkrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            # e.g. awkrs-vX.Y.Z-aarch64-apple-darwin.tar.gz → aarch64_apple_darwin
            key=$(echo "$base" | sed 's/awkrs-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v4
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from VERSION (e.g. v1.2.3 → 1.2.3).
          VERSION="${VERSION#v}"
          cd tap
          cat > Formula/awkrs.rb <<'FORMULA_HEAD'
          class Awkrs < Formula
            desc "AWK in Rust — bytecode VM + Cranelift JIT + persistent rkyv bytecode cache"
            homepage "https://github.com/MenkeTechnologies/awkrs"
            license "MIT"
          FORMULA_HEAD
          cat >> Formula/awkrs.rb <<EOF
            version "${VERSION}"

            on_macos do
            on_arm do
              url "https://github.com/MenkeTechnologies/awkrs/releases/download/v${VERSION}/awkrs-v${VERSION}-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.aarch64_apple_darwin }}"
            end
            on_intel do
              url "https://github.com/MenkeTechnologies/awkrs/releases/download/v${VERSION}/awkrs-v${VERSION}-x86_64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.x86_64_apple_darwin }}"
            end
            end

            on_linux do
            on_intel do
              url "https://github.com/MenkeTechnologies/awkrs/releases/download/v${VERSION}/awkrs-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}"
            end
            end

            def install
            bin.install "awkrs"
            bin.install "aw"
            end

            test do
              assert_match "hi", shell_output("echo hi | #{bin}/awkrs \'{print}\'").strip
            end
          end
          EOF

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/awkrs.rb
          if git diff --cached --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "awkrs: bump to ${{ github.ref_name }}"
          git push
